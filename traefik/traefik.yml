# ============================================================
# 🔒 FREEZE IT - DO NOT MODIFY THIS FILE 🔒
# ============================================================
# This file configures Traefik reverse proxy and SSL.
# Changes here will break routing and HTTPS for all domains.
#
# Last verified working: 2026-03-07
# ============================================================

global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        idleTimeout: "3600s"

certificatesResolvers:
  letsencrypt:
    acme:
      email: ben@justfeatured.com
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true
  docker:
    exposedByDefault: false

api:
  dashboard: true
  insecure: false
