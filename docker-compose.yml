version: "3.9"

services:
  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic
      - ./traefik/letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file: .env
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "6080:6080"
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic
    depends_on:
      - postgres
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.cloudcode.space`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
      - "traefik.http.routers.api-path.rule=(Host(`cloudcode.space`) || Host(`app.cloudcode.space`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-path.entrypoints=websecure"
      - "traefik.http.routers.api-path.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-path.service=api"
    restart: unless-stopped

  frontend:
    build: ./frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.cloudcode.space`) || Host(`cloudcode.space`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=80"
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cloudcomputer
      POSTGRES_USER: cloudcomputer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
